# Render Blueprint for the Tawjeeh HUB Next.js app (repo root).
# Create it from: Render -> New -> Blueprint -> this repo + branch.
# Secrets are sync:false: you paste them in Render's UI, never in Git.
services:
  - type: web
    name: tawjeeh-hub
    runtime: node
    plan: free
    region: frankfurt
    branch: main
    buildCommand: npm ci && npm run build
    startCommand: npm run start -- -p $PORT
    healthCheckPath: /
    envVars:
      - key: NODE_VERSION
        value: "20"
      # Non-secret defaults (kept in the blueprint):
      - key: SUPABASE_PRIVATE_BUCKET
        value: product-files
      - key: DOWNLOAD_URL_EXPIRY_SECONDS
        value: "120"
      # mock = safe-fail; grants nothing without a signed webhook.
      - key: PAYMENT_PROVIDER
        value: mock
      # --- Fill these in Render (sync:false) — NEVER commit them -------------
      # Set to your Render URL after the first deploy, then redeploy.
      - key: NEXT_PUBLIC_SITE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      # Optional: a random secret to enable the signed-webhook test path.
      - key: PAYMENT_WEBHOOK_SECRET
        sync: false
