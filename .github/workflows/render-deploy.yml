name: render-deploy
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy of latest main
        env:
          HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: |
          if [ -z "$HOOK" ]; then
            echo "RENDER_DEPLOY_HOOK secret not set — skipping. Add it in repo Settings → Secrets and Variables → Actions."
            exit 0
          fi
          curl -fsS -X POST "$HOOK" && echo "Render deploy triggered for latest main."
