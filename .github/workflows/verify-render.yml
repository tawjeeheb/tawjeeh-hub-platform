name: verify-render
on:
  workflow_dispatch:
jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Probe live Render site
        run: |
          set +e
          BASES="https://tawjeeh-hub.onrender.com https://tawjeeh-hub-platform.onrender.com"
          for BASE in $BASES; do
            echo "########## $BASE ##########"
            # one warmup (cold start), bounded
            curl -s -o /dev/null --connect-timeout 12 -m 75 "$BASE/"
            for P in / /majors /majors/biology /auth/login /products; do
              OUT=$(curl -s -o /tmp/b -w "%{http_code}" --connect-timeout 12 -m 30 "$BASE$P" 2>/tmp/e)
              RC=$?
              if [ "$RC" != "0" ]; then echo "STATUS $P -> ERR(curl=$RC $(cat /tmp/e | head -1))"; else echo "STATUS $P -> $OUT"; fi
            done
            echo -n "CONTENT_CHECK: "; curl -s --connect-timeout 12 -m 30 "$BASE/" | grep -ao "الوظائف حسب التخصص" | head -1; echo ""
          done
          echo "PROBE_DONE"
